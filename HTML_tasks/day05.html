<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 5 - Job Application Form</title>
</head>
<body>
  <header>
    <h1>Job Application Form</h1>
    <p>Fill in the details below to apply.</p>
  </header>

  <main>
    <form action="#" method="post" enctype="multipart/form-data">
      <fieldset>
        <legend>Personal Information</legend>
        <p>
          <label for="app-name">Full Name:</label>
          <input type="text" id="app-name" name="app_name" required>
        </p>
        <p>
          <label for="app-email">Email:</label>
          <input type="email" id="app-email" name="app_email" required>
        </p>
        <p>
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" required>
        </p>
      </fieldset>

      <fieldset>
        <legend>Professional Details</legend>
        <p>
          <label for="resume">Upload Resume:</label>
          <input type="file" id="resume" name="resume" required>
        </p>
        <p>
          <label for="experience">Years of Experience (0-15):</label>
          <input type="range" id="experience" name="experience" min="0" max="15" value="3">
        </p>
        <p>
          <label for="cover-letter">Why should we choose you?</label><br>
          <textarea id="cover-letter" name="cover_letter" rows="6" cols="50" required></textarea>
        </p>
      </fieldset>

      <p>
        <button type="submit">Apply Now</button>
        <button type="reset">Clear Form</button>
      </p>
    </form>
  </main>

  <footer>
    <p>Day 5 advanced form practice.</p>
  </footer>
</body>
</html>
