<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 7 - Media Gallery</title>
</head>
<body>
  <header>
    <h1>Media Gallery</h1>
  </header>

  <main>
    <section>
      <h2>Image Collection</h2>
      <figure>
        <img src="https://picsum.photos/300/200?random=1" alt="Random landscape 1" width="300">
        <figcaption>Nature View 1</figcaption>
      </figure>
      <figure>
        <img src="https://picsum.photos/300/200?random=2" alt="Random landscape 2" width="300">
        <figcaption>Nature View 2</figcaption>
      </figure>
      <figure>
        <img src="https://picsum.photos/300/200?random=3" alt="Random landscape 3" width="300">
        <figcaption>Nature View 3</figcaption>
      </figure>
      <figure>
        <img src="https://picsum.photos/300/200?random=4" alt="Random landscape 4" width="300">
        <figcaption>Nature View 4</figcaption>
      </figure>
      <figure>
        <img src="https://picsum.photos/300/200?random=5" alt="Random landscape 5" width="300">
        <figcaption>Nature View 5</figcaption>
      </figure>
      <figure>
        <img src="https://picsum.photos/300/200?random=6" alt="Random landscape 6" width="300">
        <figcaption>Nature View 6</figcaption>
      </figure>
    </section>

    <section>
      <h2>YouTube Video</h2>
      <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </section>

    <section>
      <h2>Audio Sample</h2>
      <audio controls>
        <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </section>

    <section>
      <h2>Video Sample</h2>
      <video width="560" height="315" controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support the video element.
      </video>
    </section>
  </main>

  <footer>
    <p>Day 7 media practice.</p>
  </footer>
</body>
</html>
